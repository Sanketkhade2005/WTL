<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Management | Task Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/employees}">👥 Employee Task Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/employees}">Employees</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tasks}">Tasks</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="header-section">
        <h2>👨‍💼 Faculty Members</h2>
        <a class="btn btn-success" th:href="@{/employees/new}">➕ Add New Employee</a>
    </div>

    <div th:if="${#lists.isEmpty(employees)}" class="alert alert-info text-center" role="alert">
        <strong>No employees found!</strong> <a th:href="@{/employees/new}" class="alert-link">Add one now</a>
    </div>

    <div th:if="${not #lists.isEmpty(employees)}">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>📛 Name</th>
                <th>📧 Email</th>
                <th>🏢 Department</th>
                <th>💼 Designation</th>
                <th>⚙️ Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="employee : ${employees}">
                <td><strong th:text="${employee.name}">Name</strong></td>
                <td th:text="${employee.email}">Email</td>
                <td th:text="${employee.department}">Department</td>
                <td th:text="${employee.designation}">Designation</td>
                <td>
                    <a th:href="@{/employees/edit/{id}(id=${employee.id})}" class="btn btn-sm btn-primary">✏️ Edit</a>
                    <a th:href="@{/employees/delete/{id}(id=${employee.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">🗑️ Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
