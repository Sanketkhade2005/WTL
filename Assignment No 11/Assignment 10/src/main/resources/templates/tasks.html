<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management | Task Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/employees}">👥 Employee Task Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/tasks}">Tasks</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="header-section">
        <h2>📋 Assigned Tasks</h2>
        <a class="btn btn-success" th:href="@{/tasks/new}">➕ Create Task</a>
    </div>

    <div th:if="${#lists.isEmpty(tasks)}" class="alert alert-info text-center" role="alert">
        <strong>No tasks assigned yet!</strong> <a th:href="@{/tasks/new}" class="alert-link">Create one now</a>
    </div>

    <div th:if="${not #lists.isEmpty(tasks)}">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>📌 Title</th>
                <th>📝 Description</th>
                <th>📅 Due Date</th>
                <th>🔔 Status</th>
                <th>👤 Assigned To</th>
                <th>⚙️ Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td><strong th:text="${task.title}">Task</strong></td>
                <td th:text="${task.description.length() > 40 ? task.description.substring(0, 40) + '...' : task.description}">Description</td>
                <td th:text="${task.dueDate}" style="font-weight: 500;">2026-01-01</td>
                <td>
                    <span class="badge" 
                        th:classappend="'badge-' + ${task.status.toLowerCase().replace(' ', '-')}"
                        th:text="${task.status}">Status</span>
                </td>
                <td th:text="${task.employee != null ? task.employee.name : '⚠️ Unassigned'}">Employee</td>
                <td>
                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}" class="btn btn-sm btn-primary">✏️ Edit</a>
                    <a th:href="@{/tasks/delete/{id}(id=${task.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">🗑️ Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
