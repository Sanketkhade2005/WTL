<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${employee.id != null} ? 'Edit Employee' : 'Add Employee'">Employee Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/employees}">👥 Employee Task Management</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/employees}">Employees</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/tasks}">Tasks</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <h2 th:text="${employee.id != null} ? '✏️ Edit Employee' : '➕ Add New Employee'">Add Employee</h2>
    
    <form th:action="@{/employees/save}" th:object="${employee}" method="post">
        <input type="hidden" th:field="*{id}" />
        
        <div class="mb-3">
            <label class="form-label">👤 Full Name</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter employee name" required />
        </div>

        <div class="mb-3">
            <label class="form-label">📧 Email Address</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="Enter email address" required />
        </div>

        <div class="mb-3">
            <label class="form-label">🏢 Department</label>
            <input type="text" class="form-control" th:field="*{department}" placeholder="e.g., Engineering, HR, Sales" required />
        </div>

        <div class="mb-3">
            <label class="form-label">💼 Designation</label>
            <input type="text" class="form-control" th:field="*{designation}" placeholder="e.g., Senior Developer, Manager" required />
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success flex-grow-1">✅ Save</button>
            <a th:href="@{/employees}" class="btn btn-secondary flex-grow-1">❌ Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
